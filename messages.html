    <main class="main-content">
        <div class="container-fluid">
            <div
                style="max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: var(--spacing-md);">
                <!-- Conversations List -->
                <div class="glass-card" style="height: calc(100vh - 150px); overflow-y: auto;">
                    <h3 style="margin-bottom: var(--spacing-md);">Messages</h3>
                    <div id="conversationsList">
                        <p style="color: var(--text-tertiary); text-align: center; padding: var(--spacing-lg);">
                            Connect with people to start messaging!
                        </p>
                    </div>
                </div>

                <!-- Chat Window -->
                <div class="chat-window">
                    <div class="chat-header" id="chatHeader">
                        <div class="flex items-center gap-sm">
                            <div class="avatar-wrapper" style="position: relative;">
                                <img src="" alt="" class="avatar" id="chatAvatar">
                                <div class="message-online-indicator"></div>
                            </div>
                            <div>
                                <div style="font-weight: 600;" id="chatName">Select a conversation</div>
                                <div style="font-size: 0.875rem; color: var(--text-tertiary);" id="chatStatus">Online
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div style="text-align: center; padding: var(--spacing-xl); color: var(--text-tertiary);">
                            Select a conversation to start messaging
                        </div>
                    </div>
                    <div class="chat-input-wrapper">
                        <textarea class="chat-input" id="messageInput" placeholder="Type a message..."
                            rows="1"></textarea>
                        <button class="btn btn-primary" id="sendMessageBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="notificationsDropdown" class="dropdown-menu hidden"
        style="position: fixed; top: 70px; right: 20px; width: 400px; max-width: 90vw;">
        <div style="padding: var(--spacing-md); border-bottom: 1px solid var(--glass-border);">
            <h4 style="margin: 0;">Notifications</h4>
        </div>
        <div class="notification-list" id="notificationsList"></div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Simple messaging demo
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = Storage.getCurrentUser();
            if (!currentUser) return;

            // Get connections to chat with
            const users = Storage.get(Storage.KEYS.USERS) || [];
            const connections = Storage.get(Storage.KEYS.CONNECTIONS) || [];

            const connectedUsers = connections
                .filter(c => (c.senderId === currentUser.id || c.receiverId === currentUser.id) && c.status === 'accepted')
                .map(c => {
                    const userId = c.senderId === currentUser.id ? c.receiverId : c.senderId;
                    return users.find(u => u.id === userId);
                })
                .filter(u => u);

            const conversationsList = document.getElementById('conversationsList');

            if (connectedUsers.length > 0) {
                conversationsList.innerHTML = connectedUsers.map(user => `
          <div class="message-item" data-user-id="${user.id}">
            <div class="message-avatar-wrapper">
              <img src="${user.avatar}" alt="${user.name}" class="avatar">
              <div class="message-online-indicator"></div>
            </div>
            <div class="message-content">
              <div class="message-header">
                <div class="message-name">${user.name}</div>
                <div class="message-time">Online</div>
              </div>
              <div class="message-preview">Click to start chatting...</div>
            </div>
          </div>
        `).join('');

                document.querySelectorAll('.message-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const userId = item.dataset.userId;
                        const user = users.find(u => u.id === userId);
                        openChat(user);
                    });
                });
            }
        });

        function openChat(user) {
            document.getElementById('chatAvatar').src = user.avatar;
            document.getElementById('chatName').textContent = user.name;
            document.getElementById('chatMessages').innerHTML = `
        <div style="text-align: center; padding: var(--spacing-xl); color: var(--text-tertiary);">
          Start of your conversation with ${user.name}
        </div>
      `;
        }

        // Send message
        document.getElementById('sendMessageBtn')?.addEventListener('click', sendMessage);
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            const currentUser = Storage.getCurrentUser();
            const chatMessages = document.getElementById('chatMessages');

            chatMessages.innerHTML += `
        <div class="chat-message sent">
          <div class="chat-message-bubble">
            <div class="chat-message-text">${message}</div>
            <div class="chat-message-meta">Just now ✓✓</div>
          </div>
        </div>
      `;

            input.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
