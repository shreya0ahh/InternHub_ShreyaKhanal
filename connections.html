    <main class="main-content">
        <div class="container-fluid">
            <div style="max-width: 900px; margin: 0 auto;">
                <h1 class="animate-fade-in-up">My Network</h1>

                <!-- Tabs -->
                <div class="glass-card mt-lg animate-fade-in-up" style="padding: 0; overflow: hidden;">
                    <div style="display: flex; border-bottom: 1px solid var(--glass-border);">
                        <button class="network-tab active" data-tab="suggestions">People You May Know</button>
                        <button class="network-tab" data-tab="connections">My Connections</button>
                        <button class="network-tab" data-tab="requests">Requests</button>
                    </div>
                </div>

                <!-- Content Sections -->
                <div id="suggestionsSection" class="network-section active mt-md"></div>
                <div id="connectionsSection" class="network-section hidden mt-md"></div>
                <div id="requestsSection" class="network-section hidden mt-md"></div>
            </div>
        </div>
    </main>

    <style>
        .network-tab {
            flex: 1;
            padding: var(--spacing-md);
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            border-bottom: 2px solid transparent;
        }

        .network-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent);
            background: var(--glass-bg);
        }

        .network-section {
            display: none;
        }

        .network-section.active {
            display: block;
        }
    </style>

    <div id="notificationsDropdown" class="dropdown-menu hidden"
        style="position: fixed; top: 70px; right: 20px; width: 400px; max-width: 90vw;">
        <div style="padding: var(--spacing-md); border-bottom: 1px solid var(--glass-border);">
            <h4 style="margin: 0;">Notifications</h4>
        </div>
        <div class="notification-list" id="notificationsList"></div>
    </div>
